  <!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teachable Machine Image Upload</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-50 font-sans min-h-screen flex flex-col items-center justify-center p-4">

    <div class="max-w-4xl w-full bg-white rounded-2xl shadow-xl p-6 md:p-8">
        <div class="text-center mb-8">
            <h1 class="text-2xl md:text-3xl font-bold text-gray-800">Teachable Machine Image Classifier</h1>
            <p class="text-gray-500 mt-2 text-sm md:text-base">ระบบจำแนกภาพถ่ายด้วย AI (อัปโหลดรูปภาพ)</p>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-2 gap-8 items-start">
            
            <div class="flex flex-col items-center">
                <div class="relative bg-gray-100 rounded-xl overflow-hidden border-2 border-dashed border-gray-300 hover:border-blue-400 transition w-full max-w-[300px] h-[300px] flex items-center justify-center p-2 group">
                    
                    <input type="file" id="image-selector" accept="image/*" onchange="previewAndPredict(event)" class="absolute inset-0 opacity-0 cursor-pointer z-10">

                    <div id="upload-placeholder" class="flex flex-col items-center justify-center text-gray-400 p-4 text-center pointer-events-none">
                        <svg class="w-12 h-12 mb-3 text-gray-400 group-hover:text-blue-500 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z"></path>
                        </svg>
                        <span class="text-sm font-medium text-gray-600">คลิก หรือ ลากรูปภาพมาวางที่นี่</span>
                        <span class="text-xs text-gray-400 mt-1">รองรับไฟล์ JPG, PNG</span>
                    </div>

                    <img id="image-preview" src="#" alt="Preview" class="hidden w-full h-full object-contain rounded-lg">
                    
                    <div id="loading-spinner" class="hidden absolute inset-0 bg-white/80 flex-col items-center justify-center z-20">
                        <div class="loader ease-linear rounded-full border-4 border-t-4 border-gray-200 h-10 w-10 mb-2"></div>
                        <p class="text-xs text-gray-600 font-medium">กำลังประมวลผลโมเดล...</p>
                    </div>
                </div>

                <button id="btn-clear" type="button" onclick="clearImage()" class="hidden mt-4 bg-gray-200 hover:bg-gray-300 text-gray-700 font-medium py-2 px-4 rounded-xl transition duration-200 text-sm cursor-pointer">
                    เปลี่ยนรูปภาพ
                </button>
            </div>

            <div class="bg-gray-50 rounded-xl p-5 border border-gray-200 h-full min-h-[300px] flex flex-col justify-between">
                <div>
                    <h2 class="text-lg font-semibold text-gray-700 mb-4 flex items-center gap-2">
                        <span class="flex h-3 w-3 relative">
                            <span class="relative inline-flex rounded-full h-3 w-3 bg-blue-500"></span>
                        </span>
                        ผลการวิเคราะห์จาก AI
                    </h2>
                    <div id="label-container" class="space-y-4">
                        <p class="text-gray-400 text-sm italic text-center py-12">อัปโหลดรูปภาพเพื่อเริ่มการทำนาย...</p>
                    </div>
                </div>
                
                <div class="text-center text-xs text-gray-400 mt-4 border-t border-gray-200 pt-3">
                    Powered by TensorFlow.js
                </div>
            </div>

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    <script src="app.js"></script>
</body>
</html>
